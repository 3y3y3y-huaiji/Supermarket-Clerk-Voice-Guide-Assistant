<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#3b82f6"/>
  
  <!-- 返回首页按钮 -->
  <rect x="100" y="100" width="200" height="50" rx="25" fill="white"/>
  <text x="200" y="135" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#111827">← 返回首页</text>
  
  <!-- 步骤编号和标题 -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="144" font-weight="bold" text-anchor="middle" fill="white">1</text>
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">找到空货位</text>
  
  <!-- 步骤说明 -->
  <rect x="300" y="400" width="600" height="150" rx="16" fill="white"/>
  <text x="600" y="485" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#111827">先看看货架上哪里空了，找到需要补货的地方。</text>
  
  <!-- 播放语音按钮 -->
  <rect x="450" y="600" width="300" height="80" rx="40" fill="#f97316"/>
  <text x="600" y="655" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="white">播放语音</text>
  
  <!-- 导航按钮 -->
  <rect x="200" y="700" width="200" height="60" rx="30" fill="white"/>
  <text x="300" y="740" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#111827">上一步</text>
  
  <rect x="800" y="700" width="200" height="60" rx="30" fill="white"/>
  <text x="900" y="740" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#111827">下一步</text>
  
  <!-- 查看常见问题按钮 -->
  <rect x="450" y="770" width="300" height="60" rx="30" fill="white"/>
  <text x="600" y="810" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#111827">查看常见问题</text>
</svg>